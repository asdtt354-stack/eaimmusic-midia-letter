<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EAIM 슬라이드쇼</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;background:#0D1B2A;color:#fff;width:100vw;height:100vh;overflow:hidden}
#stage{width:100%;height:100%;position:relative}
.slide{position:absolute;inset:0;transition:opacity .8s ease}
.slide.hidden{opacity:0;pointer-events:none}
.slide.visible{opacity:1}
.parallax-container{position:absolute;inset:0;overflow:hidden}
.bg-layer{position:absolute;inset:-4%;width:108%;height:108%;object-fit:cover;transition:opacity 1.4s ease, transform .1s ease-out;will-change:transform}
.char-layer{position:absolute;bottom:0;right:8%;height:90%;max-width:45%;object-fit:contain;transition:opacity 1s ease, transform .08s ease-out;will-change:transform;z-index:5;filter:drop-shadow(0 8px 32px rgba(0,0,0,.7))}
.char-layer.center{right:auto;left:50%;transform:translateX(-50%);max-width:35%}
.char-layer.left{right:auto;left:5%;max-width:35%}
.bg-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.88) 0%,rgba(0,0,0,.35) 55%,rgba(0,0,0,.1) 100%),linear-gradient(to top,rgba(0,0,0,.8) 0%,transparent 45%);z-index:3}
.bg-spinner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:2}
.top-bar{position:absolute;top:0;left:0;right:0;padding:18px 28px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent);z-index:10}
.scene-badge{border-radius:20px;padding:4px 16px;font-size:11px;font-weight:700;letter-spacing:2px}
.eaim-label{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:3px}
.main-content{position:absolute;top:50%;left:0;transform:translateY(-50%);padding:0 36px;max-width:54%;z-index:10;transition:opacity .7s ease .3s,transform .7s ease .3s}
.main-content.hidden{opacity:0;transform:translateY(calc(-50% + 18px))}
.main-content.visible{opacity:1;transform:translateY(-50%)}
.scene-title{font-size:clamp(20px,3vw,36px);font-weight:900;color:#fff;line-height:1.2;margin-bottom:10px;text-shadow:0 2px 20px rgba(0,0,0,.9)}
.song-badge{display:inline-flex;align-items:center;gap:8px;padding:5px 14px;border-radius:6px;margin-bottom:14px}
.song-title-text{font-size:clamp(13px,1.8vw,17px);font-weight:700;letter-spacing:.5px}
.chars-label{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:2px;margin-bottom:6px;text-transform:uppercase}
.chars-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.char-chip{padding:3px 10px;border-radius:12px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);font-size:clamp(10px,1.2vw,13px);color:rgba(255,255,255,.85)}
.tags{display:flex;gap:8px;flex-wrap:wrap}
.tag-emotion{padding:4px 12px;border-radius:16px;font-size:12px;font-weight:600}
.tag-mood{padding:4px 12px;border-radius:16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);font-size:12px;color:rgba(255,255,255,.7)}
.lyrics-panel{position:absolute;top:50%;right:28px;transform:translateY(-50%);width:38%;max-height:65%;overflow:hidden;z-index:10;transition:opacity 1s ease .6s}
.lyrics-panel.hidden{opacity:0}
.lyrics-panel.visible{opacity:1}
.lyrics-label{font-size:10px;letter-spacing:3px;margin-bottom:10px;text-transform:uppercase;opacity:.7}
.lyrics-body{position:relative;padding-left:18px}
.lyrics-bar{position:absolute;left:0;top:0;bottom:0;width:2px}
.lyric-line{font-size:clamp(13px,1.8vw,18px);line-height:1.85;font-weight:500;font-style:italic;text-shadow:0 1px 12px rgba(0,0,0,.8)}
.progress-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.08);z-index:20}
.progress-fill{height:100%;transition:width .5s ease}
#controls{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.65);backdrop-filter:blur(14px);border-radius:40px;padding:7px 16px;border:1px solid rgba(255,255,255,.12);z-index:100}
.ctrl-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.8);font-size:17px;padding:4px 8px;line-height:1}
.ctrl-btn:disabled{opacity:.25;cursor:default}
.dot-nav{display:flex;gap:5px;align-items:center;padding:0 4px}
.dot{width:7px;height:7px;border-radius:4px;cursor:pointer;background:rgba(255,255,255,.28);transition:all .25s}
.dot.active{width:20px}
#key-hint{position:fixed;top:20px;right:20px;font-size:10px;color:rgba(255,255,255,.2);pointer-events:none}
#cover-slide{background:linear-gradient(135deg,#0D1B2A 0%,#1A0A2E 55%,#0A1F0A 100%);display:flex;align-items:center;justify-content:center}
.cover-orb{position:absolute;border-radius:50%;pointer-events:none}
.cover-inner{text-align:center;z-index:1;padding:0 48px}
.cover-emoji{font-size:56px;margin-bottom:12px}
.cover-eyebrow{font-size:13px;color:#5DADE2;letter-spacing:5px;font-weight:700;margin-bottom:14px;text-transform:uppercase}
.cover-title{font-size:clamp(26px,5vw,52px);font-weight:900;color:#fff;line-height:1.15;margin-bottom:8px;text-shadow:0 4px 30px rgba(93,173,226,.3)}
.cover-sub{font-size:14px;color:#AED6F1;margin-bottom:24px;opacity:.7}
.cover-count{display:inline-block;padding:8px 22px;border-radius:24px;background:rgba(93,173,226,.12);border:1px solid rgba(93,173,226,.4);font-size:14px;color:#AED6F1;margin-bottom:28px}
.cover-hint{color:rgba(255,255,255,.25);font-size:12px;letter-spacing:1px}
#end-slide{background:radial-gradient(ellipse at 50% 30%,#1a0a2e 0%,#0D1B2A 60%,#000 100%);overflow:hidden}
.star{position:absolute;border-radius:50%;animation:twinkle 2s ease-in-out infinite alternate}
#curtain-phase{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 60px;transition:opacity 1s ease}
.curtain-label{font-size:11px;color:#FFD700;letter-spacing:4px;margin-bottom:8px;text-transform:uppercase}
.curtain-song{font-size:clamp(16px,2.5vw,22px);color:#C778DD;font-weight:700;letter-spacing:1px;margin-bottom:28px;font-style:italic}
.curtain-lyrics-wrap{text-align:center;max-width:600px}
.curtain-lyric-line{font-size:clamp(16px,2.5vw,24px);line-height:1.9;font-style:italic;font-weight:500;text-shadow:0 0 20px rgba(255,215,0,.3)}
#credits-phase{position:absolute;inset:0;overflow:hidden;transition:opacity 1.2s ease}
.credits-mask-top{position:absolute;top:0;left:0;right:0;height:120px;z-index:2;background:linear-gradient(to bottom,#0D1B2A,transparent)}
.credits-mask-bot{position:absolute;bottom:0;left:0;right:0;height:160px;z-index:2;background:linear-gradient(to top,#000,transparent)}
#credits-scroll{position:absolute;left:50%;transform:translateX(-50%);width:min(600px,90%);top:100%}
.credits-title{text-align:center;margin-bottom:48px;padding-top:20px}
.credits-divider{width:60px;height:2px;background:linear-gradient(to right,transparent,#5DADE2,transparent);margin:14px auto}
.credit-row{display:flex;justify-content:center;align-items:baseline;gap:16px;margin-bottom:20px;padding:0 20px}
.credit-role{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;min-width:80px;text-align:right;flex-shrink:0}
.credit-sep{width:1px;height:14px;background:rgba(255,255,255,.2);flex-shrink:0}
.credit-name{font-size:clamp(14px,2vw,17px);color:#fff;font-weight:600;line-height:1.5}
.credits-footer{text-align:center;margin-top:56px;padding-bottom:40px}
#back-btn{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:200;padding:10px 28px;border-radius:8px;background:rgba(93,173,226,.15);border:1px solid rgba(93,173,226,.5);color:#5DADE2;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;backdrop-filter:blur(8px);display:none}
#api-modal{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px}
#api-modal.hidden{display:none}
.api-box{background:linear-gradient(135deg,#13131a,#1a0a2e);border:1px solid rgba(93,173,226,.3);border-radius:16px;padding:32px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.api-title{font-size:18px;font-weight:800;margin-bottom:6px}
.api-sub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:22px;line-height:1.6}
.api-input{width:100%;padding:12px 14px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(93,173,226,.3);color:#fff;font-size:13px;font-family:monospace;outline:none;margin-bottom:10px;letter-spacing:1px}
.api-input:focus{border-color:#5DADE2}
.api-row{display:flex;gap:8px;margin-bottom:14px}
.api-btn-ok{flex:1;padding:11px;border-radius:8px;cursor:pointer;border:none;background:linear-gradient(135deg,#5DADE2,#1B4F72);color:#fff;font-weight:700;font-size:14px;font-family:inherit}
.api-btn-skip{padding:11px 16px;border-radius:8px;cursor:pointer;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);font-size:13px;font-family:inherit}
.api-notice{font-size:11px;color:rgba(255,255,255,.3);line-height:1.7}
.api-notice a{color:#5DADE2}
.api-status{position:fixed;top:16px;right:16px;z-index:1000;padding:6px 14px;border-radius:20px;font-size:11px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);letter-spacing:1px;display:flex;align-items:center;gap:6px;cursor:pointer}
.api-status.gemini{border-color:rgba(93,173,226,.4);color:#5DADE2}
.api-status.pollinations{border-color:rgba(105,240,174,.3);color:#69f0ae}
#blackout{position:fixed;inset:0;z-index:500;background:#000;opacity:0;pointer-events:none;transition:opacity .5s ease}
#blackout.fade-in{opacity:1;pointer-events:auto}
#blackout.fade-out{opacity:0;pointer-events:none}
#blackout-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,.15);font-size:clamp(12px,2vw,18px);letter-spacing:6px;text-transform:uppercase}
.number-lyrics-bar{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);width:90%;max-width:800px;z-index:25;text-align:center;pointer-events:none}
.number-lyrics-title{font-size:clamp(10px,1.4vw,13px);color:rgba(255,255,255,.5);letter-spacing:3px;margin-bottom:6px;text-transform:uppercase}
.number-lyrics-line{background:rgba(0,0,0,.72);backdrop-filter:blur(4px);border-radius:8px;padding:10px 24px;font-size:clamp(15px,2.4vw,22px);font-weight:700;color:#fff;line-height:1.5;letter-spacing:.5px;border:1px solid rgba(255,255,255,.1);text-shadow:0 2px 8px rgba(0,0,0,.8);min-height:48px;transition:opacity .4s ease}
.number-lyrics-line .current-line{color:#FFD700;text-shadow:0 0 20px rgba(255,215,0,.4),0 2px 8px rgba(0,0,0,.8)}
.number-lyrics-line .next-line{font-size:.75em;color:rgba(255,255,255,.45);margin-top:4px}
.lyrics-toggle-btn{position:absolute;bottom:52px;right:16px;z-index:26;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit}
.speech-bubble{position:absolute;background:rgba(255,255,255,.95);color:#1a1a1a;border-radius:18px;padding:10px 16px;font-size:clamp(12px,1.8vw,16px);font-weight:600;line-height:1.5;max-width:220px;word-break:keep-all;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:30;cursor:move;user-select:none;animation:bubblePop .3s ease;border:2px solid rgba(0,0,0,.06)}
.speech-bubble::after{content:'';position:absolute;bottom:-12px;left:24px;border:7px solid transparent;border-top-color:rgba(255,255,255,.95);border-bottom:none}
.speech-bubble.tail-right::after{left:auto;right:24px}
.speech-bubble.tail-top::after{bottom:auto;top:-12px;border-top:none;border-bottom:7px solid rgba(255,255,255,.95)}
.bubble-name{font-size:10px;color:#888;margin-bottom:3px;font-weight:700;letter-spacing:.5px}
.bubble-del{position:absolute;top:-8px;right:-8px;width:20px;height:20px;border-radius:50%;background:#ff5252;color:#fff;font-size:11px;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:31;line-height:1}
.speech-bubble:hover .bubble-del{display:flex}
#bubble-panel{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.78);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);border-radius:40px;padding:7px 14px;display:none;align-items:center;gap:7px;z-index:200;flex-wrap:wrap;justify-content:center}
#bubble-panel.show{display:flex}
#bubble-text-input{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:6px 12px;border-radius:20px;font-size:13px;outline:none;width:150px;font-family:inherit}
#bubble-name-input{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;padding:6px 10px;border-radius:20px;font-size:12px;outline:none;width:90px;font-family:inherit}
.bubble-ctrl-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit}
.bubble-ctrl-btn:hover{background:rgba(255,255,255,.22)}
.bubble-ctrl-btn.on{background:rgba(93,173,226,.35);border-color:#5DADE2;color:#5DADE2}
select.bubble-ctrl-btn{padding:5px 8px}
#subtitle-bar{position:absolute;bottom:56px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.78);color:#fff;padding:10px 28px;border-radius:8px;font-size:clamp(14px,2.2vw,20px);font-weight:600;text-align:center;max-width:80%;z-index:30;text-shadow:0 2px 8px rgba(0,0,0,.8);display:none;letter-spacing:.5px;border:1px solid rgba(255,255,255,.12);cursor:pointer}
#signal-indicator{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:600;padding:7px 18px;border-radius:24px;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);border:1px solid rgba(105,240,174,.5);color:#69f0ae;font-size:11px;letter-spacing:2px;display:none;align-items:center;gap:8px;animation:signalPop .4s ease}

#char-panel{position:fixed;bottom:80px;right:16px;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:12px;display:none;z-index:200;width:230px}
#char-panel.show{display:block}
#char-panel h4{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase}
#char-url-input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 10px;border-radius:8px;font-size:12px;outline:none;margin-bottom:6px;font-family:inherit}
#char-position-select{width:100%;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 8px;border-radius:8px;font-size:12px;outline:none;margin-bottom:8px;font-family:inherit}
.char-panel-btn{width:100%;padding:7px;border-radius:8px;background:rgba(93,173,226,.2);border:1px solid rgba(93,173,226,.4);color:#5DADE2;font-size:12px;cursor:pointer;font-family:inherit;margin-bottom:4px}
.char-panel-btn.remove{background:rgba(255,82,82,.15);border-color:rgba(255,82,82,.4);color:#ff5252}
.char-panel-btn.anim{background:rgba(255,213,79,.1);border-color:rgba(255,213,79,.3);color:#ffd54f}

#char-anim-panel{position:fixed;bottom:80px;right:260px;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:14px;display:none;z-index:200;width:220px}
#char-anim-panel.show{display:block}
#char-anim-panel h4{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:2px;margin-bottom:10px;text-transform:uppercase}
.anim-section{margin-bottom:10px}
.anim-section-title{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1px;margin-bottom:6px;text-transform:uppercase}
.anim-btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.anim-btn{padding:6px 4px;border-radius:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.65);font-size:11px;cursor:pointer;font-family:inherit;text-align:center;transition:all .2s}
.anim-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.anim-btn.active{background:rgba(93,173,226,.25);border-color:#5DADE2;color:#5DADE2}

@keyframes charSlideLeft{from{transform:translateX(-120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes charSlideRight{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes charSlideUp{from{transform:translateY(120%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes charFadeIn{from{opacity:0}to{opacity:1}}
@keyframes charFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes charBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes charSway{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-2deg)}75%{transform:rotate(2deg)}}
@keyframes charShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes charJump{0%,100%{transform:translateY(0)}40%{transform:translateY(-22px)}70%{transform:translateY(-8px)}}
@keyframes charExitRight{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
@keyframes charFadeOut{from{opacity:1}to{opacity:0}}

.char-anim-slide-left{animation:charSlideLeft .6s cubic-bezier(.22,1,.36,1) forwards}
.char-anim-slide-right{animation:charSlideRight .6s cubic-bezier(.22,1,.36,1) forwards}
.char-anim-slide-up{animation:charSlideUp .6s cubic-bezier(.22,1,.36,1) forwards}
.char-anim-fade-in{animation:charFadeIn .8s ease forwards}
.char-anim-float{animation:charFloat 3s ease-in-out infinite}
.char-anim-breathe{animation:charBreathe 3s ease-in-out infinite}
.char-anim-sway{animation:charSway 2s ease-in-out infinite}
.char-anim-shake{animation:charShake .5s ease}
.char-anim-jump{animation:charJump .5s ease}
.char-anim-exit-right{animation:charExitRight .5s ease forwards}
.char-anim-fade-out{animation:charFadeOut .5s ease forwards}

#rec-indicator{position:fixed;top:16px;left:16px;z-index:600;display:none;align-items:center;gap:8px;background:rgba(0,0,0,.8);padding:6px 14px;border-radius:20px;border:1px solid rgba(255,82,82,.5);color:#ff5252;font-size:11px;letter-spacing:1px}
#rec-indicator.show{display:flex}
.rec-dot{width:8px;height:8px;border-radius:50%;background:#ff5252;animation:recBlink 1s ease-in-out infinite}
@keyframes recBlink{0%,100%{opacity:1}50%{opacity:.2}}

@keyframes signalPop{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bubblePop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes twinkle{from{opacity:.2}to{opacity:.8}}

#fx-overlay{position:fixed;inset:0;pointer-events:none;z-index:10;overflow:hidden}
#fx-panel{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:10px 16px;display:none;gap:8px;flex-wrap:wrap;justify-content:center;z-index:101}
#fx-panel.open{display:flex}
.fx-effect-btn{padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;font-size:13px;cursor:pointer;transition:all .2s;font-family:inherit}
.fx-effect-btn.active{border-color:var(--gold,#C9A84C);background:rgba(201,168,76,.25);color:#C9A84C}

@keyframes fogMove{0%{transform:translateX(-10%) translateY(0) scale(1.1)}50%{transform:translateX(5%) translateY(-3%) scale(1.15)}100%{transform:translateX(-10%) translateY(0) scale(1.1)}}
.fog-particle{position:absolute;border-radius:50%;background:radial-gradient(ellipse,rgba(255,255,255,.18) 0%,transparent 70%);animation:fogMove linear infinite}

@keyframes rainFall{0%{transform:translateY(-10px) translateX(0)}100%{transform:translateY(110vh) translateX(-30px)}}
.rain-drop{position:absolute;width:1.5px;background:linear-gradient(transparent,rgba(174,214,241,.6));border-radius:1px;animation:rainFall linear infinite}

@keyframes lightning{0%,92%,100%{opacity:0}93%,96%{opacity:1}94%,97%{opacity:0}95%,98%{opacity:.8}}
#lightning-overlay{position:absolute;inset:0;background:rgba(255,255,255,.85);animation:lightning 4s infinite;opacity:0}

@keyframes sparkle{0%{transform:translateY(0) scale(0);opacity:0}20%{opacity:1;transform:translateY(-20px) scale(1)}100%{transform:translateY(-80px) scale(0);opacity:0}}
.light-particle{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(255,255,200,.9),rgba(255,200,50,.3));animation:sparkle ease-in-out infinite}

@keyframes snowFall{0%{transform:translateY(-10px) translateX(0) rotate(0)}100%{transform:translateY(110vh) translateX(40px) rotate(360deg)}}
.snow-flake{position:absolute;color:rgba(255,255,255,.8);font-size:14px;animation:snowFall linear infinite}

@keyframes starTwinkle{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
.star-particle{position:absolute;color:#fff;animation:starTwinkle ease-in-out infinite}
</style>
</head>
<body>

<div id="api-modal" class="hidden">
  <div class="api-box">
    <div style="font-size:32px;margin-bottom:12px">🔑</div>
    <div class="api-title">Gemini API 키 입력</div>
    <div class="api-sub">배경 이미지를 Gemini AI로 생성합니다.<br>키 없으면 건너뛰기 → Pollinations AI로 대체됩니다.</div>
    <input class="api-input" id="api-key-input" type="password" placeholder="AIza..." autocomplete="off">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <input type="checkbox" id="save-key" checked style="accentColor:#5DADE2">
      <label for="save-key" style="font-size:12px;color:rgba(255,255,255,.5);cursor:pointer">이 브라우저에 저장</label>
    </div>
    <div class="api-row">
      <button class="api-btn-ok" onclick="confirmApiKey()">✓ 확인 후 시작</button>
      <button class="api-btn-skip" onclick="skipApiKey()">건너뛰기</button>
    </div>
    <div class="api-notice">키 발급: <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a></div>
  </div>
</div>

<div class="api-status" id="api-status" onclick="resetApiKey()"></div>
<div id="signal-indicator">🚦 <span id="signal-text">음향 신호 발신 중</span></div>
<div id="rec-indicator"><div class="rec-dot"></div><span id="rec-text">녹화 중... 0:00</span></div>
<div id="blackout"><div id="blackout-text"></div></div>

<div id="char-panel">
  <h4>🎭 캐릭터 레이어</h4>
  <input id="char-url-input" placeholder="캐릭터 이미지 URL">
  <select id="char-position-select">
    <option value="right">오른쪽</option>
    <option value="left">왼쪽</option>
    <option value="center">가운데</option>
  </select>
  <button class="char-panel-btn" onclick="applyCharLayer()">✓ 적용</button>
  <button class="char-panel-btn remove" onclick="removeCharLayer()">✕ 캐릭터 제거</button>
  <button class="char-panel-btn anim" onclick="toggleAnimPanel()">🎬 애니메이션</button>
  <button class="char-panel-btn" onclick="toggleCharPanel()" style="background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.3)">닫기</button>
</div>

<div id="char-anim-panel">
  <h4>🎬 캐릭터 애니메이션</h4>
  <div class="anim-section">
    <div class="anim-section-title">✨ 등장</div>
    <div class="anim-btn-grid">
      <button class="anim-btn" onclick="playCharAnim('slide-left')">← 왼쪽</button>
      <button class="anim-btn" onclick="playCharAnim('slide-right')">→ 오른쪽</button>
      <button class="anim-btn" onclick="playCharAnim('slide-up')">↑ 아래서</button>
      <button class="anim-btn" onclick="playCharAnim('fade-in')">✦ 페이드인</button>
    </div>
  </div>
  <div class="anim-section">
    <div class="anim-section-title">🔄 상시효과</div>
    <div class="anim-btn-grid">
      <button class="anim-btn" id="anim-float" onclick="toggleLoopAnim('float')">🌊 둥둥</button>
      <button class="anim-btn" id="anim-breathe" onclick="toggleLoopAnim('breathe')">💨 숨쉬기</button>
      <button class="anim-btn" id="anim-sway" onclick="toggleLoopAnim('sway')">🍃 흔들림</button>
      <button class="anim-btn" onclick="stopLoopAnim()">⏹ 중지</button>
    </div>
  </div>
  <div class="anim-section">
    <div class="anim-section-title">💬 말할 때</div>
    <div class="anim-btn-grid">
      <button class="anim-btn" onclick="playCharAnim('jump')">⬆ 점프</button>
      <button class="anim-btn" onclick="playCharAnim('shake')">〰 흔들림</button>
    </div>
  </div>
  <div class="anim-section">
    <div class="anim-section-title">🚪 퇴장</div>
    <div class="anim-btn-grid">
      <button class="anim-btn" onclick="playCharAnim('exit-right')">→ 퇴장</button>
      <button class="anim-btn" onclick="playCharAnim('fade-out')">✦ 페이드아웃</button>
    </div>
  </div>
  <button class="anim-btn" onclick="toggleAnimPanel()" style="width:100%;margin-top:4px;color:rgba(255,255,255,.3)">닫기</button>
</div>

<div id="bubble-panel">
  <input id="bubble-name-input" placeholder="이름" maxlength="10">
  <input id="bubble-text-input" placeholder="대사 입력..." maxlength="40">
  <select class="bubble-ctrl-btn" id="bubble-tail">
    <option value="tail-left">꼬리 ↙</option>
    <option value="tail-right">꼬리 ↘</option>
    <option value="tail-top">꼬리 ↑</option>
  </select>
  <button class="bubble-ctrl-btn" onclick="addBubble()">💬 추가</button>
  <button class="bubble-ctrl-btn" onclick="clearBubbles()">🗑 전체삭제</button>
  <button class="bubble-ctrl-btn" id="subtitle-toggle" onclick="toggleSubtitleEdit()">📝 자막</button>
  <button class="bubble-ctrl-btn" onclick="toggleBubblePanel()" style="color:rgba(255,255,255,.4)">✕</button>
</div>

<div id="subtitle-bar" onclick="editSubtitle()">자막을 클릭하여 편집</div>

<div id="stage"></div>

<div id="fx-overlay"></div>
<div id="fx-panel">
  <button class="fx-effect-btn" onclick="toggleEffect('fog')">🌫️ 안개</button>
  <button class="fx-effect-btn" onclick="toggleEffect('rain')">🌧️ 비</button>
  <button class="fx-effect-btn" onclick="toggleEffect('lightning')">⚡ 번개</button>
  <button class="fx-effect-btn" onclick="toggleEffect('light')">✨ 빛</button>
  <button class="fx-effect-btn" onclick="toggleEffect('snow')">❄️ 눈</button>
  <button class="fx-effect-btn" onclick="toggleEffect('star')">🌟 별</button>
  <button class="fx-effect-btn" onclick="clearEffects()" style="border-color:#f44336;color:#f44336">✕ 끄기</button>
</div>
<div id="controls" style="display:none">
  <button class="ctrl-btn" id="btn-exit">✕</button>
  <button class="ctrl-btn" id="btn-prev">◀</button>
  <div class="dot-nav" id="dot-nav"></div>
  <button class="ctrl-btn" id="btn-next">▶</button>
  <button class="ctrl-btn" id="btn-auto">⏵</button>
  <button class="ctrl-btn" id="btn-bubble" onclick="toggleBubblePanel()">💬</button>
  <button class="ctrl-btn" id="btn-char" onclick="toggleCharPanel()">🎭</button>
  <button class="ctrl-btn" id="btn-rec" onclick="toggleRecording()" title="화면 녹화">⏺</button>
  <button class="ctrl-btn" onclick="toggleFxPanel()" title="배경 효과">🎆</button>
</div>
<div id="key-hint">← → 키보드 | ESC 종료</div>
<button id="back-btn" onclick="goBack()">↩ 처음으로</button>

<script>
'use strict';
const raw = localStorage.getItem('eaim_musical_data');
let DATA = null;
if (raw) { try { DATA = JSON.parse(raw); } catch(e) {} }
if (!DATA) {
  DATA = {
    title:'봄날의 이야기 (데모)',school:'',curtainSongTitle:'우리가 써온 이야기 (Reprise)',
    curtainLyrics:'끝나지 않는 이야기가 있어\n우리가 함께 써 내려간 그 페이지\n웃고 울며 걸어온 이 길 위에서\n우린 서로에게 빛이 되었어',
    credits:[{role:'감독',name:'박성애'},{role:'출연',name:'전체 학생'}],
    scenes:[
      {title:'봄날의 학교 교정',imagePrompt:'A bright spring schoolyard with cherry blossoms, watercolor style',characters:'민준, 서아',songTitle:'오늘이 시작이야',lyrics:'바람이 불어오는 이 교정 위에\n우리의 꿈이 피어나고 있어',emotion:'설렘',musicMood:'밝고 경쾌한'},
      {title:'방과 후 도서관',imagePrompt:'A cozy library with warm lamplight, Studio Ghibli style',characters:'민준',songTitle:'혼자만의 시간',lyrics:'아무도 없는 이 공간에서\n나는 나를 찾아가고 있어',emotion:'고요함',musicMood:'잔잔한 현악'},
      {title:'졸업식 운동장',imagePrompt:'An outdoor graduation ceremony, students tossing caps, confetti',characters:'전교생',songTitle:'우리가 써온 이야기',lyrics:'이제 우리 날아오를 시간\n함께 써온 이야기 끝나지 않아',emotion:'성취',musicMood:'장엄한 피날레'},
    ]
  };
}

const EMOTION_COLORS = {
  default:{from:'#0D1B2A',to:'#16213e',accent:'#5DADE2',lyric:'#AED6F1'},
  설렘:{from:'#0f2a4a',to:'#16213e',accent:'#FFD700',lyric:'#FFF0A0'},
  희망:{from:'#0a2a1a',to:'#0d1f14',accent:'#52C27A',lyric:'#B2F0C8'},
  고요함:{from:'#0a1628',to:'#0d2137',accent:'#AED6F1',lyric:'#D0E8FF'},
  집중:{from:'#1a0a2e',to:'#0d1b2a',accent:'#C778DD',lyric:'#EAB8FF'},
  긴장:{from:'#2e0a0a',to:'#1a0d0d',accent:'#FF6B47',lyric:'#FFB8A8'},
  용기:{from:'#2e1a0a',to:'#1a0f0a',accent:'#FF9500',lyric:'#FFD09E'},
  성취:{from:'#1a2a0a',to:'#0f1f08',accent:'#FFD700',lyric:'#FFF0A0'},
  감동:{from:'#2a0a2a',to:'#1a0a1a',accent:'#FF69B4',lyric:'#FFB8DC'},
  슬픔:{from:'#0a1a2e',to:'#0d1b2a',accent:'#7EC8E3',lyric:'#BEE3F0'},
};
function getColor(emotion) {
  if (!emotion) return EMOTION_COLORS.default;
  for (const [k,v] of Object.entries(EMOTION_COLORS)) {
    if (k!=='default' && emotion.includes(k)) return v;
  }
  return EMOTION_COLORS.default;
}

const stage = document.getElementById('stage');
const SCENES = DATA.scenes || [];
const TOTAL = SCENES.length;
let current = 0, autoPlay = false, autoTimer = null;

let mouseX = 0, mouseY = 0, rafId = null;
document.addEventListener('mousemove', e => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
  if (!rafId) rafId = requestAnimationFrame(applyParallax);
});
function applyParallax() {
  rafId = null;
  const slide = getSlideEl(current); if (!slide) return;
  const bg = slide.querySelector('.bg-layer');
  const ch = slide.querySelector('.char-layer');
  if (bg) bg.style.transform = `translate(${mouseX * -8}px, ${mouseY * -6}px) scale(1.08)`;
  if (ch) {
    const base = ch.classList.contains('center') ? 'translateX(-50%)' : '';
    if (!ch.style.animation || ch.style.animation === 'none') {
      ch.style.transform = `${base} translate(${mouseX * 18}px, ${mouseY * 10}px)`;
    }
  }
}
let floatAngle = 0;
setInterval(() => {
  if (Math.abs(mouseX) > 0.01 || Math.abs(mouseY) > 0.01) return;
  floatAngle += 0.02;
  const fx = Math.sin(floatAngle) * 0.3, fy = Math.cos(floatAngle * 0.7) * 0.2;
  const slide = getSlideEl(current); if (!slide) return;
  const bg = slide.querySelector('.bg-layer');
  const ch = slide.querySelector('.char-layer');
  if (bg) bg.style.transform = `translate(${fx * -8}px, ${fy * -6}px) scale(1.08)`;
  if (ch && (!ch.style.animation || ch.style.animation==='none')) {
    const base = ch.classList.contains('center') ? 'translateX(-50%)' : '';
    ch.style.transform = `${base} translate(${fx * 18}px, ${fy * 10}px)`;
  }
}, 30);

let GEMINI_KEY = localStorage.getItem('mm_teacher_api') || localStorage.getItem('eaim_gemini_key') || '';
const imgCache = {};
function confirmApiKey() {
  const key = document.getElementById('api-key-input').value.trim(); if (!key) return;
  GEMINI_KEY = key;
  if (document.getElementById('save-key').checked) { localStorage.setItem('eaim_gemini_key', key); localStorage.setItem('mm_teacher_api', key); }
  document.getElementById('api-modal').classList.add('hidden'); updateStatusBadge('gemini');
}
function skipApiKey() { GEMINI_KEY=''; document.getElementById('api-modal').classList.add('hidden'); updateStatusBadge('pollinations'); }
function resetApiKey() { GEMINI_KEY=''; localStorage.removeItem('eaim_gemini_key'); location.reload(); }
function updateStatusBadge(mode) {
  const el = document.getElementById('api-status');
  el.className = 'api-status ' + mode;
  el.innerHTML = mode==='gemini' ? '🔴 Gemini AI 배경' : '🟢 Pollinations 배경';
}
async function fetchGeminiImage(prompt) {
  if (imgCache[prompt]) return imgCache[prompt];
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${GEMINI_KEY}`;
  const res = await fetch(url, {method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:prompt+', 2.5D style, semi-3D illustration, cinematic, theatrical, dramatic lighting, 16:9'}]}],generationConfig:{responseModalities:['TEXT','IMAGE']}})});
  if (!res.ok) throw new Error('Gemini '+res.status);
  const data = await res.json();
  const imgPart = (data?.candidates?.[0]?.content?.parts||[]).find(p=>p.inlineData);
  if (!imgPart) throw new Error('no image');
  const dataUrl = `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`;
  imgCache[prompt] = dataUrl; return dataUrl;
}
function getPollinationsUrl(prompt, seed) {
  const s = seed || Math.floor(Math.random()*99999);
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt+', 2.5D style, semi-3D illustration, cinematic, theatrical, dramatic lighting')}?width=1280&height=720&nologo=true&seed=${s}`;
}
async function loadBgImage(scene, idx) {
  const el = document.getElementById(`scene-slide-${idx}`); if (!el) return;
  const spinner = document.getElementById(`bg-spinner-${idx}`);
  // 미디어픽쳐에서 넘어온 이미지는 http(s) URL 또는 data: URL(AI 생성/손그림 스케치) 둘 다일 수 있어요
  if (scene.imageUrl && (scene.imageUrl.startsWith('http') || scene.imageUrl.startsWith('data:'))) {
    const label = scene.imageUrl.startsWith('data:') ? '🎨 미디어픽쳐' : '📌 URL';
    setImgSrc(idx, scene.imageUrl, label); return;
  }
  if (!scene.imagePrompt) { if(spinner) spinner.style.display='none'; return; }
  if (GEMINI_KEY) {
    if(spinner) spinner.style.display='flex';
    try { const d=await fetchGeminiImage(scene.imagePrompt); if(spinner)spinner.style.display='none'; setImgSrc(idx,d,'🔴 Gemini'); }
    catch(e) { if(spinner)spinner.style.display='none'; setImgSrcWithFallback(idx, scene.imagePrompt); }
  } else { if(spinner) spinner.style.display='none'; setImgSrcWithFallback(idx, scene.imagePrompt); }
}
function setImgSrcWithFallback(idx, prompt) {
  const img=document.getElementById(`bgimg-${idx}`); if(!img) return;
  const url = getPollinationsUrl(prompt);
  img.onload=()=>{ img.style.opacity='.45'; const b=document.getElementById(`src-badge-${idx}`); if(b){b.style.display='block';b.textContent='🟢 Pollinations';} };
  img.onerror=()=>{
    const url2 = getPollinationsUrl(prompt, Math.floor(Math.random()*99999));
    img.onerror=()=>{ img.style.display='none'; };
    img.src=url2;
  };
  img.src=url;
}
function setImgSrc(idx,src,label) {
  const img=document.getElementById(`bgimg-${idx}`); if(!img) return;
  img.onload=()=>{ img.style.opacity='.45'; const b=document.getElementById(`src-badge-${idx}`); if(b){b.style.display='block';b.textContent=label;} };
  img.onerror=()=>{ if(label.includes('Gemini')) setImgSrcWithFallback(idx, src); else img.style.display='none'; };
  img.src=src;
}

function toggleCharPanel() {
  const panel = document.getElementById('char-panel');
  panel.classList.toggle('show');
  document.getElementById('btn-char').style.color = panel.classList.contains('show') ? '#FFD700' : 'rgba(255,255,255,.8)';
}
function applyCharLayer() {
  const url = document.getElementById('char-url-input').value.trim();
  if (!url) { showToast('⚠️ 캐릭터 이미지 URL을 입력해주세요'); return; }
  const pos = document.getElementById('char-position-select').value;
  const slide = getCurrentSlideEl(); if (!slide) return;
  slide.querySelectorAll('.char-layer').forEach(c => c.remove());
  const img = document.createElement('img');
  img.className = `char-layer ${pos}`;
  img.src = url; img.alt = '캐릭터';
  img.onerror = () => { img.style.display='none'; showToast('⚠️ 이미지를 불러올 수 없어요'); };
  const container = slide.querySelector('.parallax-container');
  if (container) container.appendChild(img); else slide.appendChild(img);
  document.getElementById('char-url-input').value = '';
  showToast('✅ 캐릭터 추가됨!');
}
function removeCharLayer() {
  const slide = getCurrentSlideEl(); if (!slide) return;
  slide.querySelectorAll('.char-layer').forEach(c => c.remove());
  showToast('🗑 캐릭터 제거됨');
}

function toggleAnimPanel() {
  const panel = document.getElementById('char-anim-panel');
  panel.classList.toggle('show');
}
function getCharEl() {
  const slide = getCurrentSlideEl(); if (!slide) return null;
  return slide.querySelector('.char-layer');
}
function playCharAnim(type) {
  const ch = getCharEl();
  if (!ch) { showToast('⚠️ 먼저 캐릭터를 추가해주세요'); return; }
  const allAnims = ['char-anim-slide-left','char-anim-slide-right','char-anim-slide-up',
    'char-anim-fade-in','char-anim-shake','char-anim-jump','char-anim-exit-right','char-anim-fade-out',
    'char-anim-float','char-anim-breathe','char-anim-sway'];
  allAnims.forEach(c => ch.classList.remove(c));
  void ch.offsetWidth;
  ch.classList.add('char-anim-' + type);
  const oneShot = ['shake','jump','exit-right','fade-out','slide-left','slide-right','slide-up','fade-in'];
  if (oneShot.some(o => type === o)) {
    ch.addEventListener('animationend', () => ch.classList.remove('char-anim-' + type), {once:true});
  }
  showToast('🎬 ' + type);
}
let currentLoopAnim = null;
function toggleLoopAnim(type) {
  const ch = getCharEl();
  if (!ch) { showToast('⚠️ 먼저 캐릭터를 추가해주세요'); return; }
  const loopClasses = ['char-anim-float','char-anim-breathe','char-anim-sway'];
  const btnIds = ['anim-float','anim-breathe','anim-sway'];
  if (currentLoopAnim === type) {
    loopClasses.forEach(c => ch.classList.remove(c));
    btnIds.forEach(id => { const b=document.getElementById(id); if(b) b.classList.remove('active'); });
    currentLoopAnim = null; showToast('⏹ 상시 효과 중지');
  } else {
    loopClasses.forEach(c => ch.classList.remove(c));
    btnIds.forEach(id => { const b=document.getElementById(id); if(b) b.classList.remove('active'); });
    void ch.offsetWidth;
    ch.classList.add('char-anim-' + type);
    currentLoopAnim = type;
    const btn = document.getElementById('anim-' + type); if(btn) btn.classList.add('active');
    showToast('✨ ' + type + ' 효과 적용!');
  }
}
function stopLoopAnim() {
  const ch = getCharEl(); if (!ch) return;
  ['char-anim-float','char-anim-breathe','char-anim-sway'].forEach(c => ch.classList.remove(c));
  ['anim-float','anim-breathe','anim-sway'].forEach(id => { const b=document.getElementById(id); if(b) b.classList.remove('active'); });
  currentLoopAnim = null; showToast('⏹ 상시 효과 중지');
}

let mediaRecorder = null, recChunks = [], recTimer = null, recSeconds = 0;
async function toggleRecording() {
  const btn = document.getElementById('btn-rec');
  const indicator = document.getElementById('rec-indicator');
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    clearInterval(recTimer);
    btn.textContent = '⏺';
    btn.style.color = 'rgba(255,255,255,.8)';
    indicator.classList.remove('show');
    showToast('⏹ 녹화 중지 — 저장 중...');
  } else {
    try {
      const stream = await navigator.mediaDevices.getDisplayMedia({
        video: { mediaSource: 'screen', frameRate: 30 },
        audio: true
      });
      recChunks = []; recSeconds = 0;
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const blob = new Blob(recChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `EAIM_슬라이드쇼_${Date.now()}.webm`;
        a.click();
        stream.getTracks().forEach(t => t.stop());
        showToast('🎬 영상 저장 완료!');
      };
      mediaRecorder.start(1000);
      btn.textContent = '⏹';
      btn.style.color = '#ff5252';
      indicator.classList.add('show');
      recTimer = setInterval(() => {
        recSeconds++;
        const m = Math.floor(recSeconds/60), s = recSeconds%60;
        document.getElementById('rec-text').textContent = `녹화 중... ${m}:${String(s).padStart(2,'0')}`;
      }, 1000);
      showToast('⏺ 녹화 시작!');
    } catch(e) {
      showToast('⚠️ 화면 공유를 허용해주세요');
    }
  }
}

let isTransitioning = false;
function blackout(text, cb) {
  const bl=document.getElementById('blackout'),bt=document.getElementById('blackout-text');
  bt.textContent=text||''; bl.classList.add('fade-in'); bl.classList.remove('fade-out');
  setTimeout(()=>{ cb(); setTimeout(()=>{ bl.classList.remove('fade-in'); bl.classList.add('fade-out'); setTimeout(()=>isTransitioning=false,500); },300); },500);
}
function getSlideEl(idx) {
  if (idx===0) return document.getElementById('cover-slide');
  if (idx===TOTAL+1) return document.getElementById('end-slide');
  return document.getElementById(`scene-slide-${idx-1}`);
}
function showSlide(idx) {
  if (isTransitioning) return;
  const needsBlackout=(current!==idx)&&!(current===0&&idx===0);
  if (needsBlackout) {
    isTransitioning=true;
    const label=idx===TOTAL+1?'막 내림':idx===0?'':`Scene ${String(idx).padStart(2,'0')}`;
    blackout(label,()=>doShowSlide(idx));
  } else { doShowSlide(idx); }
}
function doShowSlide(idx) {
  const old=getSlideEl(current);
  if (old) old.className=old.className.replace('visible','hidden');
  current=idx;
  const el=getSlideEl(idx); if (!el) return;
  el.className=el.className.replace('hidden','visible');
  if (idx>=1&&idx<=TOTAL) {
    const si=idx-1; initLyricBar(si);
    setTimeout(()=>{
      const mc=document.getElementById(`mc-${si}`),lp=document.getElementById(`lp-${si}`);
      if(mc){mc.classList.remove('hidden');mc.classList.add('visible');}
      if(lp){lp.classList.remove('hidden');lp.classList.add('visible');}
      const lines=(SCENES[si].lyrics||'').split('\n').filter(Boolean);
      lines.forEach((_,i)=>{ const ll=document.getElementById(`ll-${si}-${i}`);if(ll)ll.style.opacity='1'; });
    },350);
  }
  if (idx===TOTAL+1) {
    document.getElementById('controls').style.display='none';
    document.getElementById('back-btn').style.display='block';
    document.getElementById('key-hint').style.display='none';
    startEnding();
  } else {
    document.getElementById('controls').style.display='flex';
    document.getElementById('back-btn').style.display='none';
    document.getElementById('key-hint').style.display='block';
  }
  updateControls(); emitSlideSignal(idx); mouseX=0; mouseY=0;
}
function emitSlideSignal(idx) {
  if (idx < 1 || idx > TOTAL) { localStorage.removeItem('eaim_slide_signal'); hideSignalIndicator(); return; }
  const scene = SCENES[idx-1]; if (!scene) return;
  const signal = { sceneIdx:idx-1, title:scene.title||'', songTitle:scene.songTitle||'', emotion:scene.emotion||'', musicMood:scene.musicMood||'', type:scene.type||'scene', sceneNum:idx, timestamp:Date.now() };
  localStorage.setItem('eaim_slide_signal', JSON.stringify(signal));
  showSignalIndicator(scene, idx);
}
function showSignalIndicator(scene, idx) {
  const el=document.getElementById('signal-indicator'),txt=document.getElementById('signal-text');
  if(!el||!txt)return;
  txt.textContent='Scene '+String(idx).padStart(2,'0')+': '+scene.title+' — 음향 신호 발신';
  el.style.display='flex'; clearTimeout(el._timer); el._timer=setTimeout(hideSignalIndicator,3000);
}
function hideSignalIndicator() { const el=document.getElementById('signal-indicator');if(el)el.style.display='none'; }
function startEnding() {
  const lyricLines=(DATA.curtainLyrics||'').split('\n').filter(Boolean);
  setTimeout(()=>{ lyricLines.forEach((_,i)=>setTimeout(()=>{ const el=document.getElementById(`cl-${i}`);if(el)el.style.opacity='1'; },i*600)); },300);
  const delay=Math.max(3000,lyricLines.length*700+1800);
  setTimeout(()=>{
    const cp=document.getElementById('curtain-phase'),cr=document.getElementById('credits-phase');
    if(cp)cp.style.opacity='0';
    setTimeout(()=>{ if(cp)cp.style.pointerEvents='none'; if(cr){cr.style.opacity='1';cr.style.pointerEvents='auto';} startCreditsScroll(); },1000);
  },delay);
}
function startCreditsScroll() {

const lyricLineState={};
function initLyricBar(si){ lyricLineState[si]=0; updateLyricBar(si); }
function nextLyricLine(si){ const lines=(SCENES[si].lyrics||'').split('\n').filter(Boolean); const cur=lyricLineState[si]||0; if(cur<lines.length-1){lyricLineState[si]=cur+1;updateLyricBar(si);} }
function prevLyricLine(si){ const cur=lyricLineState[si]||0; if(cur>0){lyricLineState[si]=cur-1;updateLyricBar(si);} }
function updateLyricBar(si){
  const lines=(SCENES[si].lyrics||'').split('\n').filter(Boolean);
  const cur=lyricLineState[si]||0;
  const ce=document.getElementById(`nlb-cur-${si}`),ne=document.getElementById(`nlb-next-${si}`);
  if(ce)ce.textContent=lines[cur]||''; if(ne)ne.textContent=lines[cur+1]||'';
}

  const bar=document.getElementById(`nlb-${si}`),btn=document.getElementById(`lyr-toggle-${si}`);

function addBubble(){
  const text=document.getElementById('bubble-text-input').value.trim();
  if(!text){document.getElementById('bubble-text-input').focus();return;}
  const name=document.getElementById('bubble-name-input').value.trim();
  const tailType=document.getElementById('bubble-tail').value;
  const slide=getCurrentSlideEl();if(!slide)return;
  const bubble=document.createElement('div');
  bubble.className=`speech-bubble ${tailType}`;
  bubble.style.left='30%';bubble.style.top='55%';
  bubble.innerHTML=`${name?`<div class="bubble-name">${name}</div>`:''}<span>${text}</span><button class="bubble-del" onclick="this.parentElement.remove()">✕</button>`;
  makeDraggable(bubble);slide.appendChild(bubble);
  document.getElementById('bubble-text-input').value='';
  document.getElementById('bubble-text-input').focus();
}
function makeDraggable(el){
  let sx,sy,sl,st;
  el.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('bubble-del'))return;
    e.preventDefault();
    const r=el.getBoundingClientRect(),pr=el.parentElement.getBoundingClientRect();
    sx=e.clientX;sy=e.clientY;sl=r.left-pr.left;st=r.top-pr.top;
    const mv=mv=>{el.style.left=(sl+mv.clientX-sx)+'px';el.style.top=(st+mv.clientY-sy)+'px';};
    const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
  });
}

let activeEffects = new Set();

function toggleFxPanel(){
  document.getElementById('fx-panel').classList.toggle('open');
}

function toggleEffect(type){
  const overlay = document.getElementById('fx-overlay');
  const btn = document.querySelector(`.fx-effect-btn[onclick="toggleEffect('${type}')"]`);

  if(activeEffects.has(type)){
    activeEffects.delete(type);
    btn.classList.remove('active');
    overlay.querySelectorAll('.fx-'+type).forEach(el=>el.remove());
    if(type==='lightning') overlay.querySelectorAll('#lightning-overlay').forEach(el=>el.remove());
  } else {
    activeEffects.add(type);
    btn.classList.add('active');
    createEffect(type, overlay);
  }
}

function createEffect(type, overlay){
  if(type==='fog'){
    for(let i=0;i<6;i++){
      const el=document.createElement('div');
      el.className='fog-particle fx-fog';
      const size=200+Math.random()*300;
      el.style.cssText=`width:${size}px;height:${size*0.6}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${8+Math.random()*8}s;animation-delay:${Math.random()*-8}s;opacity:${0.3+Math.random()*0.4}`;
      overlay.appendChild(el);
    }
  }
  else if(type==='rain'){
    for(let i=0;i<80;i++){
      const el=document.createElement('div');
      el.className='rain-drop fx-rain';
      const h=15+Math.random()*25;
      el.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;height:${h}px;animation-duration:${0.6+Math.random()*0.8}s;animation-delay:${Math.random()*-2}s;opacity:${0.4+Math.random()*0.5}`;
      overlay.appendChild(el);
    }
  }
  else if(type==='lightning'){
    const el=document.createElement('div');
    el.id='lightning-overlay';
    el.className='fx-lightning';
    el.style.animationDuration=(3+Math.random()*4)+'s';
    overlay.appendChild(el);
  }
  else if(type==='light'){
    for(let i=0;i<30;i++){
      const el=document.createElement('div');
      el.className='light-particle fx-light';
      const size=4+Math.random()*10;
      el.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${40+Math.random()*60}%;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*-3}s`;
      overlay.appendChild(el);
    }
  }
  else if(type==='snow'){
    const flakes=['❄','❅','❆','*'];
    for(let i=0;i<40;i++){
      const el=document.createElement('div');
      el.className='snow-flake fx-snow';
      el.textContent=flakes[Math.floor(Math.random()*flakes.length)];
      const size=10+Math.random()*16;
      el.style.cssText=`left:${Math.random()*100}%;font-size:${size}px;animation-duration:${4+Math.random()*5}s;animation-delay:${Math.random()*-5}s;opacity:${0.5+Math.random()*0.5}`;
      overlay.appendChild(el);
    }
  }
  else if(type==='star'){
    const stars=['★','✦','✧','·','•'];
    for(let i=0;i<50;i++){
      const el=document.createElement('div');
      el.className='star-particle fx-star';
      el.textContent=stars[Math.floor(Math.random()*stars.length)];
      const size=8+Math.random()*18;
      el.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;font-size:${size}px;animation-duration:${1.5+Math.random()*3}s;animation-delay:${Math.random()*-3}s`;
      overlay.appendChild(el);
    }
  }
}

function clearEffects(){
  activeEffects.clear();
  document.getElementById('fx-overlay').innerHTML='';
  document.querySelectorAll('.fx-effect-btn').forEach(b=>b.classList.remove('active'));
}
</script>
</body>
</html>
